<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- page -->
  <rect width="920" height="600" rx="10" fill="#e9ecf1"/>

  <!-- window bar -->
  <rect x="0" y="0" width="920" height="40" rx="10" fill="#dfe3e9"/>
  <rect x="0" y="20" width="920" height="20" fill="#dfe3e9"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="460" y="25" text-anchor="middle" font-size="12" fill="#7b8494">localhost:8501 — PC Build Advisor</text>

  <!-- sidebar -->
  <rect x="0" y="40" width="248" height="560" fill="#f6f7f9"/>
  <line x1="248" y1="40" x2="248" y2="600" stroke="#e2e5ea" stroke-width="1"/>
  <text x="22" y="82" font-size="17" font-weight="700" fill="#1b2733">🖥️ PC Build Advisor</text>
  <text x="22" y="106" font-size="11.5" fill="#7b8494">Ask for a build by budget +</text>
  <text x="22" y="122" font-size="11.5" fill="#7b8494">use-case, or any PC question.</text>

  <text x="22" y="164" font-size="12.5" font-weight="600" fill="#3b4553">Region &amp; currency</text>
  <rect x="22" y="176" width="204" height="36" rx="7" fill="#ffffff" stroke="#cfd5de"/>
  <text x="34" y="199" font-size="12.5" fill="#1b2733">United States (USD, $)</text>
  <text x="210" y="199" font-size="11" fill="#7b8494">▾</text>

  <text x="22" y="252" font-size="12.5" font-weight="600" fill="#3b4553">Try an example</text>
  <rect x="22" y="264" width="204" height="52" rx="8" fill="#ffffff" stroke="#dfe3e9"/>
  <text x="34" y="286" font-size="12" fill="#26313d">For $1000, what do you</text>
  <text x="34" y="303" font-size="12" fill="#26313d">recommend for a gaming build?</text>

  <rect x="22" y="330" width="204" height="52" rx="8" fill="#ffffff" stroke="#dfe3e9"/>
  <text x="34" y="352" font-size="12" fill="#26313d">Best $1500 build for video</text>
  <text x="34" y="369" font-size="12" fill="#26313d">editing?</text>

  <!-- main -->
  <rect x="248" y="40" width="672" height="560" fill="#ffffff"/>
  <text x="280" y="92" font-size="26" font-weight="800" fill="#12406b">PC Build Advisor</text>

  <!-- user bubble -->
  <rect x="566" y="112" width="326" height="40" rx="12" fill="#eef1f6"/>
  <text x="882" y="137" text-anchor="end" font-size="13.5" fill="#1b2733">For $1000, what's a good gaming build?</text>
  <circle cx="906" cy="132" r="0" fill="none"/>

  <!-- assistant answer -->
  <text x="280" y="188" font-size="14" font-weight="600" fill="#1b2733">🤖 Here's a $1000 gaming build — Intel/NVIDIA vs AMD, side by side:</text>

  <!-- table -->
  <g font-size="12.5">
    <!-- header -->
    <rect x="280" y="204" width="612" height="30" fill="#f3f4f6"/>
    <text x="292" y="224" font-weight="700" fill="#3b4553">Component</text>
    <text x="392" y="224" font-weight="700" fill="#3b4553">Recommended (Intel·NVIDIA / AMD)</text>
    <text x="700" y="224" font-weight="700" fill="#3b4553">~Price</text>
    <text x="790" y="224" font-weight="700" fill="#3b4553">Pick</text>
    <text x="840" y="224" font-weight="700" fill="#3b4553">Reason</text>

    <!-- rows -->
    <line x1="280" y1="234" x2="892" y2="234" stroke="#e6e8ec"/>
    <text x="292" y="254" fill="#1b2733">CPU</text>
    <text x="392" y="254" fill="#1b2733">i5-12400F / Ryzen 5 5600</text>
    <text x="700" y="254" fill="#1b2733">$150/$140</text>
    <text x="790" y="254" font-weight="700" fill="#127a3d">AMD</text>
    <text x="840" y="254" fill="#6b7280">~$10 less, ≈equal FPS</text>

    <line x1="280" y1="264" x2="892" y2="264" stroke="#eef0f3"/>
    <text x="292" y="284" fill="#1b2733">GPU</text>
    <text x="392" y="284" fill="#1b2733">RTX 4060 / RX 6700 XT</text>
    <text x="700" y="284" fill="#1b2733">$300/$320</text>
    <text x="790" y="284" font-weight="700" fill="#b26a00">Depends</text>
    <text x="840" y="284" fill="#6b7280">RX = raster+VRAM;</text>

    <line x1="280" y1="294" x2="892" y2="294" stroke="#eef0f3"/>
    <text x="292" y="314" fill="#1b2733">RAM</text>
    <text x="392" y="314" fill="#1b2733">16GB DDR4-3600 (same both)</text>
    <text x="700" y="314" fill="#1b2733">$45</text>
    <text x="790" y="314" fill="#9aa1ab">—</text>
    <text x="840" y="314" fill="#6b7280">gaming sweet spot</text>

    <line x1="280" y1="324" x2="892" y2="324" stroke="#eef0f3"/>
    <text x="292" y="344" fill="#1b2733">SSD</text>
    <text x="392" y="344" fill="#1b2733">1TB NVMe (same both)</text>
    <text x="700" y="344" fill="#1b2733">$65</text>
    <text x="790" y="344" fill="#9aa1ab">—</text>
    <text x="840" y="344" fill="#6b7280">fast boot/loads</text>

    <line x1="280" y1="354" x2="892" y2="354" stroke="#e6e8ec"/>
  </g>

  <text x="280" y="384" font-size="13" fill="#1b2733"><tspan font-weight="700">Totals:</tspan>  ≈ $893 (Intel + NVIDIA)   ·   ≈ $893 (AMD)</text>
  <text x="280" y="410" font-size="12.5" fill="#3b4553">Excellent 1080p ultra / solid 1440p. Verdict: AMD path = best value for pure FPS.</text>

  <!-- chat input -->
  <rect x="280" y="536" width="612" height="40" rx="10" fill="#ffffff" stroke="#cfd5de"/>
  <text x="296" y="561" font-size="13" fill="#9aa1ab">Ask about PC parts or request a build for your budget…</text>
</svg>
